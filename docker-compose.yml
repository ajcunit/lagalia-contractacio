version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lagalia-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contractacio}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lagalia

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lagalia-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-contractacio}
      SECRET_KEY: ${SECRET_KEY:-changeme_in_production_please}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://localhost"]}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-5173}:8000"
    networks:
      - lagalia

volumes:
  pgdata:

networks:
  lagalia:
