version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: licitia-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-licitia}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Unified Unified Application (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: licitia-app
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-licitia}
      - SECRET_KEY=${SECRET_KEY:-b9c4c7c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8c8}
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    depends_on:
      - db
    ports:
      - "80:8000"

volumes:
  postgres_data:
